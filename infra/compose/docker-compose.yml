services:
  postgres:
    image: postgres:16
    container_name: paychainx-postgres
    environment:
      POSTGRES_DB: paychainx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - paychainx_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: paychainx-redis
    ports:
      - "6379:6379"

volumes:
  paychainx_pgdata:
